version: 1
# ============================================================
# AWS Amplify Hosting — React Router 7 (SSR) 빌드 설정
# ============================================================
#
# [이 파일이 하는 일]
# - Amplify가 이 앱을 빌드/배포할 때 사용할 명령 정의
# - React Router 7 SSR은 `build/` 폴더에 client + server 번들을 생성
# - Amplify는 이 빌드 결과물을 "compute" 환경에서 실행 (Lambda @ Edge 유사)
#
# [React Router 7 SSR 특이사항]
# - 정적 사이트 생성(SSG)이 아니라 Node 서버를 띄워야 함
# - `baseDirectory: .` 로 전체 프로젝트를 배포 대상으로 지정
# - Amplify가 Next.js 자동 감지하듯 RR7을 감지하진 않으므로, 명시적 설정 필수
#
# [환경변수]
# - 크몽 URL, 이메일, SITE_URL 등은 코드 내 상수로 관리 중 → 필요 시 Amplify 콘솔에서 env 추가
# - 현재는 별도 env 없이 빌드 가능

frontend:
  phases:
    preBuild:
      commands:
        # pnpm 전역 설치 후 프로젝트 의존성 설치
        # (Amplify 기본 이미지에는 pnpm이 없을 수 있음)
        - npm install -g pnpm@10.28.1
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    # 전체 프로젝트를 배포 대상으로 (server/index.js 실행 필요)
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      # pnpm store 캐싱으로 후속 빌드 가속
      - node_modules/**/*
      - ~/.pnpm-store/**/*
